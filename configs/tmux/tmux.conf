# Terminal settings
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -g default-terminal "screen-256color"

# Enable focus events for autoread
set-option -g focus-events on

# OSC 52 clipboard support
set -s set-clipboard on
# allow-passthrough requires tmux 3.3+
if-shell '[ "$(echo "$(tmux -V | cut -d" " -f2 | tr -d "a-z") >= 3.3" | bc)" = 1 ]' \
    'set -g allow-passthrough on'
set -as terminal-features ',xterm-256color:clipboard'

# Enable extended keys for modifier combinations (REQUIRED for Cmd+Option+j/k)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Prefix
set -g prefix C-b

# Split windows
unbind %
bind / split-window -h
unbind '"'
bind v split-window -v

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Resize panes (using arrow keys with repeatable flag)
bind-key -r Left resize-pane -L 5
bind-key -r Down resize-pane -D 5
bind-key -r Up resize-pane -U 5
bind-key -r Right resize-pane -R 5

# Also keep Ctrl+hjkl for resize (repeatable)
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

# Maximize pane
bind m resize-pane -Z
set -g mouse on

# Vim movements for copy mode
set-window-option -g mode-keys vi
bind V copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi MouseDragEnd1Pane

# Pane borders
set -g pane-border-lines heavy
set -g pane-active-border-style "fg=#47FF9C"
set -g pane-border-style "fg=colour240"

# Pane border status
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#47FF9C bold] > ,#[fg=colour240]   }#{pane_current_command}"

# Flash on pane switch
set -g display-panes-time 1200
set -g display-panes-active-colour "#47FF9C"
set -g display-panes-colour "#FF5555"

# Sesh integration
bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash .)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(  )+reload(sesh list)'
)\""

bind-key x kill-pane
set -g detach-on-destroy off

# Remove cursor styling (requires tmux 3.4+)
if-shell '[ "$(echo "$(tmux -V | cut -d" " -f2 | tr -d "a-z") >= 3.4" | bc)" = 1 ]' \
    'set -g cursor-style default; set -ug cursor-colour'

# Plugin manager path
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'roosta/tmux-pop'

# tmux-pop settings (flash on pane switch)
set -g @tmux-pop-color 'colour30'
set -g @tmux-pop-duration 0.04

# Resurrect/Continuum settings
set -g @resurrect-dir "$HOME/.tmux/resurrect"
set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Status bar
set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "centre"
set-option -g status-left-length 90
set-option -g status-right-length 90

# Initialize TPM (MUST be at the very bottom)
run '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'

# Fix vim-tmux-navigator overriding C-l
bind-key -T prefix C-l resize-pane -R 5

# Reduce escape time (recommended by nvim checkhealth)
set-option -sg escape-time 10

# Sesh - quickly switch to last session
bind-key "L" run-shell "sesh last"

# Preserve WezTerm transparency (must be AFTER plugins load)
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
